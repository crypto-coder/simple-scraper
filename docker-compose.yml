services:
  runtime-init:
    image: alpine:3.21
    user: "0:0"
    environment:
      RUNTIME_UID: ${RUNTIME_UID:-1000}
      RUNTIME_GID: ${RUNTIME_GID:-1000}
      RUNTIME_BASE: /data
    volumes:
      - ./runtime:/data
      - ./scripts/init-runtime-dirs.sh:/init-runtime-dirs.sh:ro
    entrypoint: ["/bin/sh", "/init-runtime-dirs.sh"]
    restart: "no"

  n8n-import:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    image: site_scraper-n8n:latest
    user: "1000:1000"
    env_file:
      - config/n8n.env
    volumes:
      - ./runtime/n8n:/home/node/.n8n
      - ./n8n/workflows:/import:ro
      - ./n8n/import-workflow.sh:/import-workflow.sh:ro
    entrypoint: ["/bin/sh", "/import-workflow.sh"]
    depends_on:
      runtime-init:
        condition: service_completed_successfully
    restart: "no"

  simple-scraper:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - config/n8n.env
    environment:
      CLOUD_LLM_URL: ${CLOUD_LLM_URL:-}
      CLOUD_LLM_API_KEY: ${CLOUD_LLM_API_KEY:-}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-gemma4:e4b}
      OUTPUT_FOLDER: /app/output
      OLLAMA_MODELS: /app/models
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      N8N_INTERNAL_URL: http://n8n:5678
      N8N_WEBHOOK_SCRAPE_URL: http://n8n:5678/webhook/scrape
      SCRAPER_BASE_URL: http://simple-scraper:3000
    volumes:
      - ./runtime/models:/app/models
      - ./runtime/output:/app/output
      - ./runtime/data:/app/data
    depends_on:
      runtime-init:
        condition: service_completed_successfully
      n8n-import:
        condition: service_completed_successfully
      n8n:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    image: site_scraper-n8n:latest
    user: "1000:1000"
    env_file:
      - config/n8n.env
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_PATH: /workflow/
      N8N_EDITOR_BASE_URL: http://localhost:3000/workflow/
      WEBHOOK_URL: http://localhost:3000/workflow/
      N8N_PROXY_HOPS: 1
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      EXTERNAL_FRONTEND_HOOKS_URLS: ""
      N8N_DIAGNOSTICS_CONFIG_FRONTEND: ""
      N8N_DIAGNOSTICS_CONFIG_BACKEND: ""
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - type: bind
        source: ./runtime/n8n
        target: /home/node/.n8n
      - type: bind
        source: ./runtime/n8n-files
        target: /files
      - type: bind
        source: ./n8n/workflows
        target: /files/workflows
        read_only: true
    expose:
      - "5678"
    depends_on:
      runtime-init:
        condition: service_completed_successfully
      n8n-import:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
