<div class="workflow-shell" [class.workflow-shell--ready]="!!workflowUrl">
  @if (loading) {
    <p class="workflow-status">Signing in to n8n…</p>
  } @else if (error) {
    <p class="workflow-status workflow-status--error">{{ error }}</p>
  } @else if (workflowUrl) {
    <iframe
      class="workflow-frame"
      [src]="workflowUrl"
      title="n8n workflow editor"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  }
</div>
